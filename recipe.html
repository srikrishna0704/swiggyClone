<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <i class="fas fa-utensils"></i> Foodie
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
        </nav>
    </header>

    <main>
        <div class="recipe-container">
            <!-- JS will populate this -->
            <div class="recipe-header">
                <img id="recipe-img" src="" alt="Recipe Image">
                <div class="recipe-info">
                    <h1 id="recipe-title">Loading...</h1>
                    <p class="recipe-desc" id="recipe-desc"></p>
                    <div class="recipe-meta">
                        <span class="price"><i class="fas fa-tag"></i> <span id="recipe-price"></span></span>
                        <span class="time"><i class="fas fa-clock"></i> <span id="recipe-time"></span></span>
                    </div>
                    <button class="btn-add" style="margin-top: 20px; font-size: 16px;">Add to Order</button>
                </div>
            </div>

            <div class="recipe-details">
                <div class="details-block">
                    <h3>Ingredients</h3>
                    <ul id="ingredients-list">
                        <!-- Dynamic List -->
                    </ul>
                </div>

                <div class="details-block">
                    <h3>Preparation Steps</h3>
                    <ol id="steps-list">
                        <!-- Dynamic Steps -->
                    </ol>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Foodie App. Happy Cooking!</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
